<script>
    // javascript object
    var jsObj = {
        name : "Andrew Anderson",
        age : 56,
        address : "Indore, Madhya Pradesh"
    }
    document.write("<br>typeof jsObj : "+typeof jsObj);
    document.write("<br>Name : "+jsObj.name);
    document.write("<br>Age : "+jsObj.age);
    document.write("<br>Address : "+jsObj.address);
    
    // json object 
    var jsonObj = {
        "name" : "Andrew Anderson",
        "age" : 56,
        "address" : "Indore, Madhya Pradesh"
    }
    document.write("<br><br>typeof jsonObj : "+typeof jsonObj);
    document.write("<br>Name : "+jsonObj.name);
    document.write("<br>Age : "+jsonObj.age);
    document.write("<br>Address : "+jsonObj.address);
    
    // json string 
    var jsonString = `{
        "name" : "Andrew Anderson",
        "age" : 56,
        "address" : "Indore, Madhya Pradesh"
    }`
    document.write("<br><br>typeof jsonString : "+typeof jsonString);

    var obj = JSON.parse(jsonString); // conversion of json string into javascript object
    document.write("<br><br>typeof obj : "+typeof obj);
    document.write("<br>Name : "+obj.name);
    document.write("<br>Age : "+obj.age);
    document.write("<br>Address : "+obj.address);

    // convert object into json string
    var json_String = JSON.stringify(jsObj);
    document.write("<br><br>typeof json_String : "+typeof json_String);

</script>
