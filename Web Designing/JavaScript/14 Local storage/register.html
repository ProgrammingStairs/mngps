<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="myScript.js"></script>
</head>
<body>
    <center>
        <h3>Example of LocalStorage</h3>
        <hr width="300">
            <a href="index.html">Home</a>   |   
            <a href="login.html">Login</a>   |   
            <a href="register.html">Register</a>   
        <hr width="300">
        <h3>Register Page</h3>
        <form action="login.html" onsubmit="return register()">
            Username <br>
            <input 
                type="text"
                placeholder="Enter Username"
                name="username"
                id="username"
            > <br>
            Email <br>
            <input 
                type="email"
                placeholder="Enter Email"
                name="email"
                id="email"
            > <br>
            Password <br>
            <input 
                type="password"
                placeholder="Enter Password"
                name="password"
                id="password"
            > <br>
            Address <br>
            <input 
                type="text"
                placeholder="Enter Address"
                name="address"
                id="address"
            > <br>
            <input 
                type="submit"
                value="Register"
            ><input 
                type="reset"
                value="Reset"
            > <br>
        </form>
    </center>
</body>
</html>
