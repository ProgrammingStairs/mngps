<script>
    function Employee(name,address){
        this.name = name;
        this.address = address; 
        this.showDetails = ()=>{
            document.write("Name : "+this.name);
            document.write("<br>Address : "+this.address);
        }
    }
    Employee.prototype.pincode = 452010;
    Employee.prototype.printDetails = function(){
            document.write("<br>Pincode : "+this.pincode);
        }
    
    var emp = new Employee("Andrew Anderson","Indore, Madhya Pradesh");
    // console.log(emp.name);
    emp.showDetails();
    emp.printDetails();
</script>
