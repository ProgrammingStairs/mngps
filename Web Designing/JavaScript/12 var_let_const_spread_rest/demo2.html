<script>
    // let is block scopic (ES6)
    let a = 100;
    document.write("a : "+a);
    a = 200;
    document.write("<br>a : "+a);
    {
        // in case of let a is not initialized
       // document.write("<br>inside block a : "+a);
        let a = 300; // here the concept of hoisting takes place
        document.write("<br>inside block  a : "+a);
    }
    document.write("<br>outside block a : "+a);
    function show(){
       // document.write("<br>inside function a : "+a);
        let a = 400;   // here the concept of hoisting takes place
        document.write("<br>inside function  a : "+a);
    }
    show();
    document.write("<br>outside function  a : "+a);

</script>
