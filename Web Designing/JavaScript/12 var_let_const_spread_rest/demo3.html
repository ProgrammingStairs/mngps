<script>
    // const is block scopic (ES6)
    const a = 100;
    document.write("a : "+a);
    {
        const a = 300;
        document.write("<br>inside block  a : "+a);
    }
    document.write("<br>outside block a : "+a);
    function show(){
        const a = 400; 
        document.write("<br>inside function  a : "+a);
    }
    show();
    document.write("<br>outside function  a : "+a);

</script>
