<script>
    // var is function scopic (ES5)
    var a = 100;
    document.write("a : "+a);
    a = 200;
    document.write("<br>a : "+a);
    {
        document.write("<br>inside block a : "+a);
        var a = 300;
        document.write("<br>inside block  a : "+a);
    }
    document.write("<br>outside block a : "+a);
    function show(){
        // internally var a = undefined;
        document.write("<br>inside function a : "+a);
        var a = 400;   // here the concept of hoisting takes place
        document.write("<br>inside function  a : "+a);
    }
    show();
    document.write("<br>outside function  a : "+a);

</script>
