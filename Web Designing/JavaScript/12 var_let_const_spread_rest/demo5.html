
<script>
    // example showing the concept of array destructuring and rest parameter
    var [car1,car2,...car3] = ["nano","verna","kia","dzire"];
    // ...car3 here car3 is rest parameter

    document.write("<br>car1 : "+car1);
    document.write("<br>car2 : "+car2);
    document.write("<br>car3 : "+car3);
</script>
