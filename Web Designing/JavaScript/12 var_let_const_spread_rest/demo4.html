    // example showing the concept of spread operator
    var car1 = ["nano","verna","kia","dzire"];
    var car2 = [...car1];
    document.write("<br>car1 : "+car1);
    document.write("<br>car2 : "+car2);
    car2[2] = "Sonet";
    document.write("<br>car1 : "+car1);
    document.write("<br>car2 : "+car2);

    var name = "Andrew";
    document.write("<br>Result : "+[...name]);
</script>
